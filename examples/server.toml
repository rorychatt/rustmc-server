# RustMC Server Configuration Example

[server]
bind = "0.0.0.0:25565"
plugins_directory = "plugins"
max_players = 20
motd = "RustMC Server - A Rust-powered Minecraft server"
view_distance = 8
simulation_distance = 8

[world]
# World type: "flat" or "normal" (normal not yet implemented)
type = "flat"
spawn_x = 0
spawn_y = 64
spawn_z = 0

[network]
# Timeout (seconds) for connections not yet in Play state
non_play_timeout_secs = 30

[transfer]
# secret = "your-secret-here"

[rate_limit]
# Number of invalid packets before disconnecting a client
invalid_packet_threshold = 16
# Time window (seconds) for counting invalid packets
invalid_packet_window_secs = 10

[performance]
# Number of Tokio worker threads (0 = auto-detect based on CPU cores)
worker_threads = 0
# Target ticks per second
tps = 20
