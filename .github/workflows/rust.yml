name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy, rustfmt

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --workspace

    - name: Run tests
      run: cargo test --workspace

    - name: Run doc tests
      run: cargo test --workspace --doc

    - name: Build benchmarks
      run: cargo bench --workspace --no-run

    - name: Clippy
      run: cargo clippy --workspace -- -D warnings

    - name: Format check
      run: cargo fmt --all -- --check

  validate-block-states:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
    - name: Install jq
      run: sudo apt-get install -y jq
    - name: Regenerate block states
      run: chmod +x ./tools/*.sh && ./tools/regenerate_block_states.sh
    - name: Check for drift
      run: |
        if ! git diff --exit-code server/data/block_states.json; then
          echo "ERROR: block_states.json is out of sync with the server JAR"
          echo "Run ./tools/regenerate_block_states.sh and commit the result"
          exit 1
        fi
